name: "Module Release"

on:
  push:
    branches: [ "main" ]
    paths:
      - 'modules/**'

jobs:
  # 🛡️ Security
  scan:
    uses: rhyscraig/aws-terraform-platform-aws-workflows/.github/workflows/reusable-secret-scan.yaml@main

  # 🧪 Test (Using tfctl to validate modules)
  validate:
    needs: [scan]
    uses: rhyscraig/aws-terraform-platform-aws-workflows/.github/workflows/reusable-static-analysis.yaml@main
    secrets:
      GH_PAT: ${{ secrets.GH_PAT }}

  # 📦 Release
  release:
    needs: [validate]
    uses: rhyscraig/aws-terraform-platform-aws-workflows/.github/workflows/reusable-tagging.yaml@main
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
